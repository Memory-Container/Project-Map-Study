<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="quiz2.css" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="../../shared/utils.css" />
    </head>
    <body>
        <header></header>
        <main>
            <section class="quiz">
                <div class="container flex-c g10">
                    <div class="f25 w5">
                        <span lang="vi"> Tiến độ trắc nghiệm </span>
                    </div>
                    <div class="progressbar">
                        <div class="progress"></div>
                    </div>
                    <div class="f15 flex-r c-w50">
                        <span lang="vi">Hoàn thành</span>&nbsp;
                        <span class="c-w50 progress-info"> 0/8</span>
                    </div>
                </div>
            </section>
            <section class="choices">
                <div class="container">
                    <div class="question f30 m-f20 w7 text-center"></div>
                    <div class="flex-r t-flex-c t-j-left g10 a-center">
                        <button class="card" onclick="setActive(1)"></button>
                        <button class="card" onclick="setActive(2)"></button>
                        <button class="card" onclick="setActive(3)"></button>
                    </div>
                    <div class="flex-r g10 j-center">
                        <button class="primary" id="prev">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" class="flip">
                                <path class="arrow-right" />
                            </svg>
                            <span> Quay lại </span>
                        </button>
                        <button class="primary" id="next">
                            <span> Tiếp theo </span>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path class="arrow-right" />
                            </svg>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </body>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="quiz2.js"></script>
    <script src="../../shared/layout.js"></script>
</html>
