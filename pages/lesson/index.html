<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="lesson.css" />
        <link rel="stylesheet" href="../../shared/modal.css" />
        <link rel="stylesheet" href="../../shared/utils.css" />
    </head>
    <body>
        <header></header>
        <main>
            <div class="boxLessons">
                <a href="../../pages/roadmapTarget/index.html" class="prev"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
                <div class="listLessons">
                    <div class="lessonsName">Git, Github và Vercel</div>
                    <ul class="lessons"></ul>
                </div>
            </div>
            <div class="boxDetailLesson"></div>
            <div class="boxTool">
                <div class="wrapLessons">
                    <div class="titleWrapName">LUYỆN TẬP</div>
                    <div class="noteIcon" id="instructHomework">
                        <i class="fa-solid fa-question icon"></i>
                    </div>
                    <div class="block">
                        <a href="../../pages/quizLesson/index.html">
                            <div class="blockLessons">
                                <div class="lessonsIcon"><i class="fa-solid fa-q instruct" data-instruct="homeworks"></i></div>
                                <div class="lessonContent">Trắc nghiệm lý thuyết</div>
                            </div>
                        </a>
                        <div class="blockLessons" id="practiceExer">
                            <div class="lessonsIcon"><i class="fa-solid fa-file"></i></div>
                            <div class="lessonContent">Bài tập thực hành</div>
                        </div>
                    </div>
                </div>
                <div class="wrapLessonPoint">
                    <div class="noteIcon" id="instructSumPoint">
                        <i class="fa-solid fa-question icon"></i>
                    </div>
                    <div class="titleWrapName">BẢNG ĐIỂM</div>
                    <div class="blockLessonPoint">
                        <div class="itemButton">
                            <div class="deraction choosing" data-item="theory">Lý thuyết</div>
                            <div class="deraction" data-item="practice">Thực hành</div>
                        </div>
                        <div class="itemContent"></div>
                    </div>
                </div>
            </div>
        </main>
        <footer></footer>
    </body>
    <script type="module" src="./lesson.js"></script>
    <script src="../../shared/layout.js"></script>
    <script src="../../shared/modal.js"></script>
