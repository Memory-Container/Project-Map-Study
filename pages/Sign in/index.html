<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="signin.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Gelasio:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Michroma&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans+JP:wght@100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Sansita+Swashed:wght@300&family=Sriracha&family=WindSong:wght@400;500&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="container">
            <h1>Đăng nhập</h1>
            <div class="wrapInput">
                <label for="" class="form">Nhập mã số sinh viên</label>
                <input
                    type="text"
                    class="input"
                    id="ID"
                    pattern="[0-9]*"
                    maxlength="6"
                    inputmode="numeric"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                />
            </div>
            <div class="wrapInput">
                <label for="" class="form">Mật khẩu</label>
                <input
                    type="password"
                    class="input"
                    id="password"
                    oninput="this.value = this.value.replace(/\s/g, '')"
                />
            </div>
            <div class="wrapButton">
                <div id="status"></div>
                <button class="login">Đăng nhập</button>
            </div>
            <p>Don't have an account? <a href="#!">Register</a></p>
        </div>
    </body>
    <script src="mains.js"></script>
    <script src="signin.js"></script>
</html>
