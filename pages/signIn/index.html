<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
        <link rel="stylesheet" href="../../shared/utils.css" />
        <link rel="stylesheet" href="../../shared/modal.css" />
        <link rel="stylesheet" href="signIn.css" />
    </head>
    <body>
        <main>
            <section class="pageSignIn">
                <a href="../../pages/homepage/index.html" class="homepagePrev"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>
                <form class="sign-in-container" id="signInForm">
                    <h1>Đăng nhập tài khoản</h1>
                    <div class="sign-in-information">
                        <input type="text" placeholder="Mã số sinh viên của bạn" id="mssv" pattern="[0-9]*" maxlength="8" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                        <input type="password" placeholder="Mật khẩu" id="password" />
                    </div>
                    <p class="validation"></p>
                    <button type="submit" class="primary">Đăng nhập</button>
                </form>
            </section>
        </main>
    </body>
    <script type="module" src="./staticJS/signin.js"></script>
    <script src="../../shared/layout.js"></script>
    <script src="../../shared/modal.js"></script>
</html>
